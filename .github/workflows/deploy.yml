name: Deploy Jupyter Book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_URL: /ab-test-content
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Jupyter Book
        run: pip install jupyter-book

      - name: Build the book
        run: jupyter-book build --html

      - name: Find build output
        id: find_output
        run: |
          if [ -d "_build/html" ]; then
            echo "path=_build/html" >> $GITHUB_OUTPUT
          elif [ -d "_build/site" ]; then
            echo "path=_build/site" >> $GITHUB_OUTPUT
          elif [ -d "_build" ]; then
            echo "path=_build" >> $GITHUB_OUTPUT
          fi
          echo "Build output contents:"
          find _build -maxdepth 2 -type f | head -20

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.find_output.outputs.path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
